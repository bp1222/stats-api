# /v1/teams/{teamId}/roster
get:
  operationId: getTeamRoster
  summary: Retrieves team player roster
  description: >
    Returns the player roster for a team. Use rosterType to specify which
    roster to return (40Man, active, fullRoster, etc.).
  parameters:
    - $ref: ../components/parameters/parameters.yaml#/PathTeamId
    - $ref: ../components/parameters/parameters.yaml#/RosterType
    - $ref: ../components/parameters/parameters.yaml#/Season
    - $ref: ../components/parameters/parameters.yaml#/Date
    - $ref: ../components/parameters/parameters.yaml#/Fields
    - $ref: ../components/parameters/parameters.yaml#/Hydrate
  tags:
    - People
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            title: RosterResponse
            type: object
            required:
              - roster
            properties:
              roster:
                type: array
                items:
                  title: RosterEntry
                  type: object
                  properties:
                    person:
                      $ref: ../components/schemas/schemas.yaml#/Person
                    jerseyNumber:
                      type: string
                    position:
                      $ref: ../components/schemas/schemas.yaml#/Position
                    status:
                      title: RosterStatus
                      type: object
                      properties:
                        code:
                          type: string
                        description:
                          type: string
                    parentTeamId:
                      type: number
              link:
                type: string
              teamId:
                type: number
              rosterType:
                type: string
