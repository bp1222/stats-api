title: Boxscore
description: >
  Boxscore
type: object
required:
  - teams
  - officials
properties:
  teams:
    title: BoxscoreTeams
    type: object
    required:
      - away
      - home
    properties:
      away:
        $ref: ./schemas.yaml#/BoxscoreTeam
      home:
        $ref: ./schemas.yaml#/BoxscoreTeam
  officials:
    type: array
    items:
      $ref: ./schemas.yaml#/GameOfficial
  info:
    type: array
    items:
      title: BoxscoreInfoItem
      type: object
      properties:
        label:
          type: string
        value:
          type: string
  pitchingNotes:
    type: array
    items:
      type: string
  topPerformers:
    type: array
    items:
      type: object
