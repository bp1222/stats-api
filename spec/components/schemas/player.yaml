title: Player
description: >
  A player entry in a boxscore or roster context. Contains a person sub-object
  plus roster/game-specific fields.
type: object
required:
  - person
  - position
  - stats
  - seasonStats
properties:
  person:
    $ref: ./schemas.yaml#/Person
  jerseyNumber:
    type: string
  position:
    $ref: ./schemas.yaml#/Position
  status:
    title: PlayerStatus
    type: object
    properties:
      code:
        type: string
      description:
        type: string
  parentTeamId:
    type: number
  battingOrder:
    type: string
  note:
    type: string
  gameStatus:
    title: PlayerGameStatus
    type: object
    properties:
      isCurrentBatter:
        type: boolean
      isCurrentPitcher:
        type: boolean
      isOnBench:
        type: boolean
      isSubstitute:
        type: boolean
  stats:
    title: PlayerGameStats
    type: object
    required:
      - batting
      - pitching
      - fielding
    properties:
      batting:
        $ref: ./schemas.yaml#/BattingStats
      pitching:
        $ref: ./schemas.yaml#/PitchingStats
      fielding:
        $ref: ./schemas.yaml#/FieldingStats
  seasonStats:
    title: PlayerSeasonStats
    type: object
    required:
      - batting
      - pitching
      - fielding
    properties:
      batting:
        $ref: ./schemas.yaml#/BattingStats
      pitching:
        $ref: ./schemas.yaml#/PitchingStats
      fielding:
        $ref: ./schemas.yaml#/FieldingStats
