title: Linescore
description: >
  Linescore
type: object
required:
  - teams
  - balls
  - strikes
  - outs
properties:
  currentInning:
    type: number
  currentInningOrdinal:
    type: string
  inningState:
    type: string
  inningHalf:
    type: string
  isTopInning:
    type: boolean
  scheduledInnings:
    type: number
    default: 9
  innings:
    type: array
    items:
      $ref: ./schemas.yaml#/Inning
  teams:
    title: LinescoreTeams
    type: object
    required:
      - away
      - home
    properties:
      away:
        $ref: ./schemas.yaml#/LinescoreTeam
      home:
        $ref: ./schemas.yaml#/LinescoreTeam
  defense:
    title: LinescoreDefense
    description: Current defensive positions (batter, pitcher, catcher, etc.).
    type: object
    additionalProperties: true
  offense:
    title: LinescoreOffense
    description: Current offensive base runners and batter (batter, onDeck, first, etc.).
    type: object
    additionalProperties: true
  balls:
    type: number
    default: 0
  strikes:
    type: number
    default: 0
  outs:
    type: number
    default: 0
